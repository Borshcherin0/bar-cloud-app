<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барный учёт Pro ☁️</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a30;
            --card2: #222240;
            --accent: #e94560;
            --gold: #f5c518;
            --text: #eee;
            --muted: #999;
            --border: #2a2a4a;
            --green: #2ecc71;
            --blue: #5b9bd5;
            --red: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.8em;
            margin-bottom: 12px;
        }

        .status-bar {
            text-align: center;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .status-dot.checking { background: var(--gold); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nav {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--card); border-radius: 12px; padding: 4px;
            flex-wrap: wrap;
        }
        .nav-btn {
            flex: 1; min-width: 60px; padding: 8px 4px;
            border: none; background: transparent; color: var(--muted);
            border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 600;
            transition: all 0.2s; text-align: center;
        }
        .nav-btn.active { background: var(--accent); color: white; }
        .nav-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }

        .panel { display: none; }
        .panel.active { display: block; }

        .card {
            background: var(--card); border-radius: 12px; padding: 14px;
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .card h3 { color: var(--gold); margin-bottom: 8px; font-size: 0.95em; }

        .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

        input, select {
            background: var(--card2); border: 1px solid var(--border);
            color: var(--text); padding: 9px 10px; border-radius: 8px;
            font-size: 13px; outline: none; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--accent); }
        input { flex: 1; min-width: 100px; }
        select { min-width: 100px; cursor: pointer; }

        .btn {
            padding: 9px 14px; border: none; border-radius: 8px;
            font-weight: 600; font-size: 12px; cursor: pointer;
            transition: all 0.2s; font-family: inherit; white-space: nowrap;
        }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { filter: brightness(1.2); }
        .btn-green { background: var(--green); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); }
        .btn-sm { padding: 4px 8px; font-size: 10px; }
        .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 700; }
        .btn-gold:hover { filter: brightness(1.2); }

        .list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; background: var(--card2); border-radius: 8px;
            margin-bottom: 5px; gap: 8px; flex-wrap: wrap; font-size: 13px;
        }
        .counter { display: flex; align-items: center; gap: 6px; }
        .counter-val { font-weight: 700; color: var(--gold); min-width: 18px; text-align: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.85em; }
        th, td { padding: 7px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-size: 0.7em; text-transform: uppercase; }
        tfoot td { font-weight: 700; color: var(--gold); border-top: 2px solid var(--accent); }

        .summary {
            background: linear-gradient(135deg, var(--card), #1a1a3e);
            border: 1px solid var(--accent); border-radius: 12px;
            padding: 16px; text-align: center; margin-top: 10px;
        }
        .summary .total { font-size: 2em; font-weight: 800; color: var(--gold); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px; margin-bottom: 12px;
        }
        .stat-card {
            background: var(--card); border-radius: 8px; padding: 12px;
            text-align: center; border: 1px solid var(--border);
        }
        .stat-val { font-size: 1.3em; font-weight: 700; color: var(--gold); }
        .stat-lbl { color: var(--muted); font-size: 0.7em; margin-top: 2px; }

        .bar-chart {
            display: flex; align-items: flex-end; gap: 4px;
            height: 150px; padding: 6px 0;
            border-bottom: 2px solid var(--border);
        }
        .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar {
            width: 100%; max-width: 40px; border-radius: 4px 4px 0 0;
            transition: height 0.4s; position: relative;
        }
        .bar-lbl { margin-top: 4px; font-size: 8px; color: var(--muted); text-align: center; word-break: break-word; line-height: 1.1; }
        .bar-val { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 9px; color: var(--gold); }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 16px; border-radius: 16px; font-weight: 600; font-size: 13px;
            z-index: 999; animation: toastAnim 2s forwards; pointer-events: none;
        }
        .toast.ok { background: var(--green); color: white; }
        .toast.err { background: var(--red); color: white; }

        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .empty { text-align: center; color: var(--muted); padding: 20px; font-style: italic; font-size: 0.9em; }
        .session-actions { display: flex; gap: 6px; margin-top: 6px; }

        /* Модалка чека */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center;
            align-items: center; padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card); border-radius: 14px; padding: 16px;
            max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto;
            border: 1px solid var(--border);
        }
        .modal-content img { width: 100%; border-radius: 8px; }
        .modal-actions { display: flex; gap: 8px; margin-top: 10px; }

        @media (max-width: 600px) {
            .row { flex-direction: column; }
            .btn { width: 100%; }
            .nav { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍸 Барный учёт Pro</h1>
        <p class="subtitle">Облачная БД Neon PostgreSQL</p>

        <div class="status-bar">
            <span class="status-dot checking" id="statusDot"></span>
            <span style="font-size:12px;color:var(--muted);" id="statusText">Проверка соединения...</span>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-panel="bar">📋 Бар</button>
            <button class="nav-btn" data-panel="guests">👥 Гости</button>
            <button class="nav-btn" data-panel="drinks">🍹 Меню</button>
            <button class="nav-btn" data-panel="bill">💰 Счёт</button>
            <button class="nav-btn" data-panel="history">📜 История</button>
            <button class="nav-btn" data-panel="analytics">📊 Аналитика</button>
        </div>

        <!-- Панель: Бар -->
        <div class="panel active" id="panel-bar">
            <div class="card">
                <h3>🆕 Сессия: <span id="sessId">—</span></h3>
                <div class="row">
                    <select id="barGuest"><option value="">Гость...</option></select>
                    <select id="barDrink"><option value="">Напиток...</option></select>
                    <button class="btn btn-accent" id="btnAddOrder">➕</button>
                </div>
                <button class="btn btn-green" style="width:100%;" id="btnNewSess">🔄 Закрыть и начать новую</button>
            </div>
            <div id="ordersList"></div>
        </div>

        <!-- Панель: Гости -->
        <div class="panel" id="panel-guests">
            <div class="card">
                <h3>👤 Добавить гостя</h3>
                <div class="row">
                    <input type="text" id="guestName" placeholder="Имя">
                    <button class="btn btn-accent" id="btnAddGuest">Добавить</button>
                </div>
            </div>
            <div id="guestsList"></div>
        </div>

        <!-- Панель: Напитки -->
        <div class="panel" id="panel-drinks">
            <div class="card">
                <h3>🍹 Добавить напиток</h3>
                <div class="row">
                    <input type="text" id="drinkName" placeholder="Название">
                    <input type="number" id="drinkPrice" placeholder="Цена" style="max-width:80px;">
                    <button class="btn btn-accent" id="btnAddDrink">Добавить</button>
                </div>
            </div>
            <div id="drinksList"></div>
        </div>

        <!-- Панель: Счёт -->
        <div class="panel" id="panel-bill">
            <div id="billContent"></div>
            <button class="btn btn-green" style="width:100%;margin-top:8px;" id="btnCloseSess">🔄 Закрыть сессию</button>
        </div>

        <!-- Панель: История -->
        <div class="panel" id="panel-history">
            <div class="card">
                <h3>📜 Архив сессий</h3>
                <button class="btn btn-outline btn-sm" id="btnRefreshHist">🔄 Обновить</button>
            </div>
            <div id="sessionsList"></div>
        </div>

        <!-- Панель: Аналитика -->
        <div class="panel" id="panel-analytics">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><h3>📊 Топ напитков</h3><div id="drinksChart"></div></div>
            <div class="card"><h3>👥 Топ гостей</h3><div id="guestsChart"></div></div>
        </div>
    </div>

    <!-- Модалка чека -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <h3 style="color:var(--gold);margin-bottom:10px;">🧾 Чек</h3>
            <img id="receiptImage" src="" alt="Чек">
            <div class="modal-actions">
                <button class="btn btn-accent" id="btnDownloadReceipt">💾 Скачать PNG</button>
                <button class="btn btn-outline" id="btnCloseModal">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="toasts"></div>

    <script>
        // ============ API КОНФИГУРАЦИЯ ============
        // На Render будет автоматически подставлен правильный URL
        const API_BASE = '';

        let currentSessionId = null;
        let allGuests = [];
        let allDrinks = [];
        let currentReceiptDataUrl = '';

        // ============ API УТИЛИТЫ ============
        async function api(method, path, body = null) {
            const opts = {
                method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (body) opts.body = JSON.stringify(body);

            const res = await fetch(`${API_BASE}${path}`, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Ошибка сервера' }));
                throw new Error(err.detail || `HTTP ${res.status}`);
            }
            return res.json();
        }

        function showToast(msg, type = 'ok') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => el.remove(), 2100);
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // ============ ПРОВЕРКА СЕРВЕРА ============
        async function checkServer() {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'status-dot checking';
            txt.textContent = 'Проверка...';
            try {
                await api('GET', '/api/guests');
                dot.className = 'status-dot online';
                txt.textContent = 'Сервер онлайн • Neon PostgreSQL';
            } catch (e) {
                dot.className = 'status-dot offline';
                txt.textContent = 'Сервер офлайн — проверь Render';
            }
        }

        // ============ ЗАГРУЗКА ============
        async function loadData() {
            try {
                const [guests, drinks, session] = await Promise.all([
                    api('GET', '/api/guests'),
                    api('GET', '/api/drinks'),
                    api('GET', '/api/sessions/active'),
                ]);
                allGuests = guests;
                allDrinks = drinks;
                currentSessionId = session.id;
                document.getElementById('sessId').textContent = currentSessionId;
            } catch (e) {
                showToast('Ошибка загрузки: ' + e.message, 'err');
            }
        }

        // ============ ГОСТИ ============
        async function addGuest() {
            const inp = document.getElementById('guestName');
            const name = inp.value.trim();
            if (!name) return showToast('Введи имя', 'err');
            try {
                await api('POST', '/api/guests', { name });
                inp.value = '';
                await refreshAll();
                showToast('✅ Гость добавлен');
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function deleteGuest(id) {
            if (!confirm('Удалить гостя?')) return;
            try {
                await api('DELETE', `/api/guests/${id}`);
                await refreshAll();
                showToast('🗑 Удалён');
            } catch (e) { showToast(e.message, 'err'); }
        }

        function renderGuests() {
            const c = document.getElementById('guestsList');
            if (!allGuests.length) { c.innerHTML = '<div class="empty">Нет гостей</div>'; return; }
            c.innerHTML = allGuests.map(g => `
                <div class="list-item">
                    <span>👤 ${esc(g.name)}</span>
                    <button class="btn btn-danger btn-sm" data-action="deleteGuest" data-id="${g.id}">✕</button>
                </div>
            `).join('');
        }

        // ============ НАПИТКИ ============
        async function addDrink() {
            const name = document.getElementById('drinkName').value.trim();
            const price = parseInt(document.getElementById('drinkPrice').value);
            if (!name || isNaN(price) || price <= 0) return showToast('Проверь данные', 'err');
            try {
                await api('POST', '/api/drinks', { name, price });
                document.getElementById('drinkName').value = '';
                document.getElementById('drinkPrice').value = '';
                await refreshAll();
                showToast('🍹 Напиток добавлен');
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function deleteDrink(id) {
            if (!confirm('Удалить напиток?')) return;
            try {
                await api('DELETE', `/api/drinks/${id}`);
                await refreshAll();
                showToast('🗑 Удалён');
            } catch (e) { showToast(e.message, 'err'); }
        }

        function renderDrinks() {
            const c = document.getElementById('drinksList');
            if (!allDrinks.length) { c.innerHTML = '<div class="empty">Меню пусто</div>'; return; }
            c.innerHTML = allDrinks.map(d => `
                <div class="list-item">
                    <span>🍹 ${esc(d.name)} — <strong>${d.price} ₽</strong></span>
                    <button class="btn btn-danger btn-sm" data-action="deleteDrink" data-id="${d.id}">✕</button>
                </div>
            `).join('');
        }

        function updateSelects() {
            const gs = document.getElementById('barGuest');
            const ds = document.getElementById('barDrink');
            gs.innerHTML = '<option value="">Гость...</option>' +
                allGuests.map(g => `<option value="${g.id}">👤 ${esc(g.name)}</option>`).join('');
            ds.innerHTML = '<option value="">Напиток...</option>' +
                allDrinks.map(d => `<option value="${d.id}">🍹 ${esc(d.name)} (${d.price}₽)</option>`).join('');
        }

        // ============ ЗАКАЗЫ ============
        async function addOrder() {
            const gid = document.getElementById('barGuest').value;
            const did = document.getElementById('barDrink').value;
            if (!gid || !did) return showToast('Выбери гостя и напиток', 'err');
            try {
                await api('POST', '/api/orders', {
                    session_id: currentSessionId,
                    guest_id: gid,
                    drink_id: did,
                });
                await renderOrders();
                const guest = allGuests.find(g => g.id === gid);
                const drink = allDrinks.find(d => d.id === did);
                showToast(`📝 ${guest?.name||'?'} → ${drink?.name||'?'}`);
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function renderOrders() {
            const c = document.getElementById('ordersList');
            try {
                const orders = await api('GET', `/api/orders?session_id=${currentSessionId}`);
                if (!orders.length) { c.innerHTML = '<div class="empty">Заказов нет</div>'; return; }

                const groups = {};
                orders.forEach(o => {
                    const k = `${o.guest_id}|${o.drink_id}`;
                    if (!groups[k]) groups[k] = { guest_id: o.guest_id, drink_id: o.drink_id, count: 0, total: 0 };
                    groups[k].count++;
                    groups[k].total += o.price;
                });

                c.innerHTML = Object.values(groups).map(g => {
                    const guest = allGuests.find(x => x.id === g.guest_id);
                    const drink = allDrinks.find(x => x.id === g.drink_id);
                    return `
                        <div class="list-item">
                            <span>👤 ${esc(guest?.name)} — 🍹 ${esc(drink?.name)}</span>
                            <div class="counter">
                                <span style="color:var(--muted);">×${g.count}</span>
                                <span class="counter-val">${g.total}₽</span>
                                <button class="btn btn-danger btn-sm" data-action="removeOne" data-guest="${g.guest_id}" data-drink="${g.drink_id}">−1</button>
                                <button class="btn btn-outline btn-sm" data-action="removeAll" data-guest="${g.guest_id}" data-drink="${g.drink_id}">✕</button>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { c.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        async function removeOne(guestId, drinkId) {
            try {
                const orders = await api('GET', `/api/orders?session_id=${currentSessionId}`);
                const order = orders.findLast(o => o.guest_id === guestId && o.drink_id === drinkId);
                if (order) {
                    await api('DELETE', `/api/orders/${order.id}`);
                    await renderOrders();
                    showToast('−1');
                }
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function removeAll(guestId, drinkId) {
            try {
                const orders = await api('GET', `/api/orders?session_id=${currentSessionId}`);
                for (const o of orders.filter(o => o.guest_id === guestId && o.drink_id === drinkId)) {
                    await api('DELETE', `/api/orders/${o.id}`);
                }
                await renderOrders();
                showToast('🗑 Группа удалена');
            } catch (e) { showToast(e.message, 'err'); }
        }

        // ============ СЧЁТ ============
        async function renderBill() {
            const c = document.getElementById('billContent');
            try {
                const orders = await api('GET', `/api/orders?session_id=${currentSessionId}`);
                if (!orders.length) { c.innerHTML = '<div class="empty">Счёт пуст</div>'; return; }

                const guestTotals = {};
                const guestDetails = {};
                orders.forEach(o => {
                    if (!guestTotals[o.guest_id]) guestTotals[o.guest_id] = 0;
                    guestTotals[o.guest_id] += o.price;
                    if (!guestDetails[o.guest_id]) guestDetails[o.guest_id] = {};
                    if (!guestDetails[o.guest_id][o.drink_id]) {
                        const drink = allDrinks.find(d => d.id === o.drink_id);
                        guestDetails[o.guest_id][o.drink_id] = { count: 0, price: o.price, name: drink?.name || '?' };
                    }
                    guestDetails[o.guest_id][o.drink_id].count++;
                });

                let html = '';
                let total = 0;
                for (const [gid, sum] of Object.entries(guestTotals)) {
                    total += sum;
                    const guest = allGuests.find(g => g.id === gid);
                    html += `<div class="card"><h3>👤 ${esc(guest?.name||'Неизвестный')}</h3><table>
                        <thead><tr><th>Напиток</th><th>Цена</th><th>×</th><th>Сумма</th></tr></thead><tbody>`;
                    for (const [did, d] of Object.entries(guestDetails[gid])) {
                        html += `<tr><td>🍹 ${esc(d.name)}</td><td>${d.price}₽</td><td>×${d.count}</td><td><strong>${d.price*d.count}₽</strong></td></tr>`;
                    }
                    html += `<tfoot><tr><td colspan="3">Итого</td><td>${sum} ₽</td></tr></tfoot></table></div>`;
                }
                html += `<div class="summary"><div style="color:var(--muted);">💸 Общий счёт</div><div class="total">${total} ₽</div></div>`;
                c.innerHTML = html;
            } catch (e) { c.innerHTML = '<div class="empty">Ошибка</div>'; }
        }

        // ============ СЕССИИ ============
        async function closeAndNewSession() {
            try {
                await api('POST', '/api/sessions/close');
                const s = await api('GET', '/api/sessions/active');
                currentSessionId = s.id;
                document.getElementById('sessId').textContent = currentSessionId;
                await refreshAll();
                showToast('🆕 Новая сессия!');
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function renderHistory() {
            const c = document.getElementById('sessionsList');
            try {
                const sessions = await api('GET', '/api/sessions');
                const closed = sessions.filter(s => s.closed_at).sort((a, b) =>
                    new Date(b.closed_at) - new Date(a.closed_at));

                if (!closed.length) { c.innerHTML = '<div class="empty">Нет завершённых сессий</div>'; return; }

                c.innerHTML = closed.slice(0, 20).map(s => {
                    const d = new Date(s.closed_at).toLocaleString('ru-RU');
                    return `
                        <div class="card">
                            <h3>📅 ${d}</h3>
                            <p>💰 <strong>${s.total_amount} ₽</strong></p>
                            <div class="session-actions">
                                <button class="btn btn-outline btn-sm" data-action="viewSession" data-id="${s.id}">👁 Детали</button>
                                <button class="btn btn-gold btn-sm" data-action="downloadReceipt" data-id="${s.id}">🧾 Чек</button>
                                <button class="btn btn-danger btn-sm" data-action="deleteSession" data-id="${s.id}">🗑</button>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { c.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        async function viewSession(sid) {
            try {
                const orders = await api('GET', `/api/orders?session_id=${sid}`);
                const guests = await api('GET', '/api/guests');
                const drinks = await api('GET', '/api/drinks');

                let msg = `Сессия ${sid}\n\n`;
                const groups = {};
                for (const o of orders) {
                    const guest = guests.find(g => g.id === o.guest_id);
                    const drink = drinks.find(d => d.id === o.drink_id);
                    const k = `${guest?.name||'?'} — ${drink?.name||'?'}`;
                    if (!groups[k]) groups[k] = { count: 0, sum: 0 };
                    groups[k].count++;
                    groups[k].sum += o.price;
                }
                for (const [k, v] of Object.entries(groups)) msg += `${k}: ×${v.count} = ${v.sum} ₽\n`;
                msg += `\nИтого: ${orders.reduce((s,o)=>s+o.price,0)} ₽`;
                alert(msg);
            } catch (e) { showToast(e.message, 'err'); }
        }

        async function deleteSession(sid) {
            if (!confirm('Удалить сессию и все её заказы?')) return;
            try {
                await api('DELETE', `/api/sessions/${sid}`);
                await renderHistory();
                showToast('🗑 Сессия удалена');
            } catch (e) { showToast(e.message, 'err'); }
        }

        // ============ ГЕНЕРАЦИЯ ЧЕКА ============
        async function generateReceipt(sessionId) {
            try {
                const [session, orders, guests, drinks] = await Promise.all([
                    api('GET', '/api/sessions').then(s => s.find(x => x.id === sessionId)),
                    api('GET', `/api/orders?session_id=${sessionId}`),
                    api('GET', '/api/guests'),
                    api('GET', '/api/drinks'),
                ]);

                if (!session) throw new Error('Сессия не найдена');

                const guestTotals = {};
                const guestDetails = {};
                orders.forEach(o => {
                    if (!guestTotals[o.guest_id]) guestTotals[o.guest_id] = 0;
                    guestTotals[o.guest_id] += o.price;
                    if (!guestDetails[o.guest_id]) guestDetails[o.guest_id] = {};
                    if (!guestDetails[o.guest_id][o.drink_id]) {
                        const drink = drinks.find(d => d.id === o.drink_id);
                        guestDetails[o.guest_id][o.drink_id] = { count: 0, price: o.price, name: drink?.name || '?' };
                    }
                    guestDetails[o.guest_id][o.drink_id].count++;
                });

                const grandTotal = orders.reduce((s, o) => s + o.price, 0);
                const guestCount = Object.keys(guestTotals).length;
                const dateStr = new Date(session.closed_at || session.created_at).toLocaleString('ru-RU', {
                    day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                const WIDTH = 600;
                const padding = 40;
                const LINE_HEIGHT = 26;
                const GUEST_HEADER_HEIGHT = 34;

                let totalItems = 5; // заголовок, дата, номер, разделители, footer
                for (const gid of Object.keys(guestDetails)) {
                    totalItems += 1 + Object.keys(guestDetails[gid]).length + 1;
                }
                const HEIGHT = Math.max(400, padding * 2 + 100 + totalItems * LINE_HEIGHT);

                const canvas = document.createElement('canvas');
                canvas.width = WIDTH;
                canvas.height = HEIGHT;
                const ctx = canvas.getContext('2d');

                // Фон
                const bgGrad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                bgGrad.addColorStop(0, '#1a1a2e');
                bgGrad.addColorStop(1, '#0f0f1a');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);

                // Рамки
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 3;
                ctx.strokeRect(8, 8, WIDTH - 16, HEIGHT - 16);
                ctx.strokeStyle = '#f5c518';
                ctx.lineWidth = 1;
                ctx.strokeRect(14, 14, WIDTH - 28, HEIGHT - 28);

                let y = padding + 16;
                ctx.textAlign = 'center';

                ctx.fillStyle = '#f5c518';
                ctx.font = 'bold 26px "Segoe UI", system-ui, sans-serif';
                ctx.fillText('🍸 BAR CHECK', WIDTH / 2, y);
                y += 34;

                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
                ctx.fillText('Барный учёт Pro', WIDTH / 2, y);
                y += 24;

                ctx.fillStyle = '#999';
                ctx.font = '12px "Segoe UI", system-ui, sans-serif';
                ctx.fillText(dateStr, WIDTH / 2, y);
                y += 18;
                ctx.fillText(`Чек № ${sessionId.slice(-8).toUpperCase()}`, WIDTH / 2, y);
                y += 24;

                // Разделитель
                ctx.strokeStyle = '#f5c518';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 3]);
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(WIDTH - padding, y);
                ctx.stroke();
                ctx.setLineDash([]);
                y += 18;

                for (const gid of Object.keys(guestDetails)) {
                    const guest = guests.find(g => g.id === gid);
                    ctx.fillStyle = '#e94560';
                    ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(`👤 ${guest?.name || 'Неизвестный'}`, padding, y);
                    ctx.textAlign = 'right';
                    ctx.fillText(`${guestTotals[gid]} ₽`, WIDTH - padding, y);
                    y += GUEST_HEADER_HEIGHT;

                    for (const did of Object.keys(guestDetails[gid])) {
                        const d = guestDetails[gid][did];
                        ctx.fillStyle = '#ccc';
                        ctx.font = '13px "Segoe UI", system-ui, sans-serif';
                        ctx.textAlign = 'left';
                        ctx.fillText(`  🍹 ${d.name}`, padding + 14, y);
                        ctx.textAlign = 'center';
                        ctx.fillText(`×${d.count}`, WIDTH / 2 + 30, y);
                        ctx.textAlign = 'right';
                        ctx.fillText(`${d.price * d.count} ₽`, WIDTH - padding, y);
                        y += LINE_HEIGHT;
                    }
                    y += 2;
                }

                y += 4;
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(WIDTH - padding, y);
                ctx.stroke();
                y += 22;

                ctx.fillStyle = '#f5c518';
                ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('💸 ИТОГО:', padding, y);
                ctx.textAlign = 'right';
                ctx.fillText(`${grandTotal} ₽`, WIDTH - padding, y);
                y += 26;

                ctx.fillStyle = '#999';
                ctx.font = '12px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`На ${guestCount} гостей`, WIDTH / 2, y);
                y += 28;

                ctx.fillStyle = '#666';
                ctx.font = 'italic 11px "Segoe UI", system-ui, sans-serif';
                ctx.fillText('Спасибо за вечер! 🍸', WIDTH / 2, y);

                return canvas.toDataURL('image/png');
            } catch (e) {
                console.error('Receipt error:', e);
                throw e;
            }
        }

        async function downloadReceipt(sessionId) {
            showToast('🧾 Генерирую чек...');
            try {
                const dataUrl = await generateReceipt(sessionId);
                currentReceiptDataUrl = dataUrl;
                document.getElementById('receiptImage').src = dataUrl;
                document.getElementById('receiptModal').classList.add('active');
                showToast('✅ Чек готов!');
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'err');
            }
        }

        function saveReceiptToFile() {
            if (!currentReceiptDataUrl) return;
            const a = document.createElement('a');
            a.href = currentReceiptDataUrl;
            a.download = `bar_receipt_${new Date().toISOString().slice(0,10)}.png`;
            a.click();
            showToast('💾 Чек сохранён!');
        }

        // ============ АНАЛИТИКА ============
        async function renderAnalytics() {
            try {
                const data = await api('GET', '/api/analytics');
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-val">${data.total_orders}</div><div class="stat-lbl">Заказов</div></div>
                    <div class="stat-card"><div class="stat-val">${data.total_revenue}₽</div><div class="stat-lbl">Выручка</div></div>
                    <div class="stat-card"><div class="stat-val">${data.sessions_count}</div><div class="stat-lbl">Сессий</div></div>
                    <div class="stat-card"><div class="stat-val">${data.guests_count}</div><div class="stat-lbl">Гостей</div></div>
                `;

                const maxD = data.top_drinks[0]?.cnt || 1;
                document.getElementById('drinksChart').innerHTML = data.top_drinks.length ?
                    `<div class="bar-chart">${data.top_drinks.map(d => `
                        <div class="bar-wrap">
                            <div class="bar" style="height:${(d.cnt/maxD)*100}%;background:var(--accent);">
                                <span class="bar-val">${d.cnt}</span>
                            </div>
                            <div class="bar-lbl">${esc(d.name)}</div>
                        </div>`).join('')}</div>` : '<div class="empty">Нет данных</div>';

                const maxG = data.top_guests[0]?.total || 1;
                document.getElementById('guestsChart').innerHTML = data.top_guests.length ?
                    `<div class="bar-chart">${data.top_guests.map(g => `
                        <div class="bar-wrap">
                            <div class="bar" style="height:${(g.total/maxG)*100}%;background:var(--blue);">
                                <span class="bar-val">${g.total}₽</span>
                            </div>
                            <div class="bar-lbl">${esc(g.name)}</div>
                        </div>`).join('')}</div>` : '<div class="empty">Нет данных</div>';
            } catch (e) { showToast('Ошибка аналитики', 'err'); }
        }

        // ============ НАВИГАЦИЯ ============
        async function switchPanel(name) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`[data-panel="${name}"]`)?.classList.add('active');
            document.getElementById(`panel-${name}`)?.classList.add('active');

            if (name === 'bill') await renderBill();
            if (name === 'history') await renderHistory();
            if (name === 'analytics') await renderAnalytics();
            if (name === 'bar') await renderOrders();
        }

        async function refreshAll() {
            await loadData();
            updateSelects();
            await renderOrders();
            const active = document.querySelector('.panel.active')?.id;
            if (active === 'panel-bill') await renderBill();
            if (active === 'panel-history') await renderHistory();
            if (active === 'panel-analytics') await renderAnalytics();
        }

        // ============ СОБЫТИЯ ============
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.addEventListener('click', () => switchPanel(b.dataset.panel));
        });

        document.getElementById('btnAddGuest').addEventListener('click', addGuest);
        document.getElementById('btnAddDrink').addEventListener('click', addDrink);
        document.getElementById('btnAddOrder').addEventListener('click', addOrder);
        document.getElementById('btnNewSess').addEventListener('click', closeAndNewSession);
        document.getElementById('btnCloseSess').addEventListener('click', closeAndNewSession);
        document.getElementById('btnRefreshHist').addEventListener('click', renderHistory);

        document.getElementById('btnDownloadReceipt').addEventListener('click', saveReceiptToFile);
        document.getElementById('btnCloseModal').addEventListener('click', () => {
            document.getElementById('receiptModal').classList.remove('active');
            currentReceiptDataUrl = '';
        });
        document.getElementById('receiptModal').addEventListener('click', function(e) {
            if (e.target === this) { this.classList.remove('active');
                currentReceiptDataUrl = ''; }
        });

        document.getElementById('guestName').addEventListener('keydown', e => { if (e.key === 'Enter') addGuest(); });
        document.getElementById('drinkPrice').addEventListener('keydown', e => { if (e.key === 'Enter') addDrink(); });

        document.addEventListener('click', async function(e) {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            e.stopPropagation();
            const action = target.dataset.action;
            const id = target.dataset.id;
            const guestId = target.dataset.guest;
            const drinkId = target.dataset.drink;
            switch (action) {
                case 'deleteGuest': await deleteGuest(id); break;
                case 'deleteDrink': await deleteDrink(id); break;
                case 'removeOne': await removeOne(guestId, drinkId); break;
                case 'removeAll': await removeAll(guestId, drinkId); break;
                case 'viewSession': await viewSession(id); break;
                case 'downloadReceipt': await downloadReceipt(id); break;
                case 'deleteSession': await deleteSession(id); break;
            }
        });

        // ============ ЗАПУСК ============
        (async () => {
            await checkServer();
            await refreshAll();
            setInterval(checkServer, 30000);
        })();
    </script>
</body>
</html>
