<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барный учёт Pro ☁️</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🍸 Барный учёт Pro</h1>
        <p class="subtitle">Облачная БД Neon PostgreSQL</p>

        <div class="status-bar">
            <span class="status-dot checking" id="statusDot"></span>
            <span id="statusText">Проверка соединения...</span>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-panel="bar">📋 Бар</button>
            <button class="nav-btn" data-panel="guests">👥 Гости</button>
            <button class="nav-btn" data-panel="drinks">🍹 Меню</button>
            <button class="nav-btn" data-panel="bill">💰 Счёт</button>
            <button class="nav-btn" data-panel="history">📜 История</button>
            <button class="nav-btn" data-panel="analytics">📊 Аналитика</button>
        </div>

        <!-- Панель: Бар -->
        <div class="panel active" id="panel-bar">
    <div class="card">
        <h3>🆕 Сессия: <span id="sessId">—</span></h3>
        <div class="row">
            <select id="barGuest"><option value="">Гость...</option></select>
        </div>
        <div class="row">
            <input type="text" id="drinkSearchInput" placeholder="🔍 Поиск напитка..." 
                   oninput="updateDrinkSelect()" style="margin-bottom:6px;">
        </div>
        <div class="row">
            <select id="barDrink"><option value="">Напиток...</option></select>
            <button class="btn btn-accent" id="btnAddOrder">➕</button>
        </div>
        <button class="btn btn-green" id="btnNewSess">🔄 Закрыть и начать новую</button>
    </div>
    <div id="ordersList"></div>
            <!-- Покерная секция -->
    <div id="pokerSection"></div>
</div>

        <!-- Панель: Гости -->
        <div class="panel" id="panel-guests">
            <div class="card">
                <h3>👤 Добавить гостя</h3>
                <div class="row">
                    <input type="text" id="guestName" placeholder="Имя">
                    <button class="btn btn-accent" id="btnAddGuest">Добавить</button>
                </div>
            </div>
            <div id="guestsList"></div>
        </div>

    
        <!-- Панель: Напитки -->
<div class="panel" id="panel-drinks">
    <div class="card">
        <h3>🍹 Добавить позицию</h3>
        <div class="row">
            <input type="text" id="drinkName" placeholder="Название">
            <input type="number" id="drinkPrice" placeholder="Цена (может быть отрицательной)" style="max-width:130px;">
            <select id="drinkCategory">
                <option value="alco">🍸 Алко</option>
                <option value="no_alco">🥤 Без алко</option>
                <option value="hookah">💨 Кальян</option>
                <option value="poker">♠️ Покер</option>
            </select>
            <select id="drinkPriceType">
                <option value="regular">Обычная цена</option>
                <option value="discount">🔻 Скидка</option>
                <option value="refund">↩️ Возврат</option>
                <option value="compliment">🎁 Комплимент</option>
            </select>
            <button class="btn btn-accent" id="btnAddDrink">Добавить</button>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:4px;">
            💡 Для скидок и возвратов можно указывать отрицательную цену (например: -100)
        </p>
    </div>
    
    <div class="card">
        <h3>🔍 Фильтры</h3>
        <div class="row">
            <input type="text" id="drinkSearch" placeholder="🔍 Поиск напитка..." oninput="loadDrinks()">
            <select id="drinkCategoryFilter" onchange="drinkCategoryFilter=this.value;loadDrinks();">
                <option value="all">Все категории</option>
                <option value="alco">🍸 Алко</option>
                <option value="no_alco">🥤 Без алко</option>
                <option value="hookah">💨 Кальян</option>
                <option value="poker">♠️ Покер</option>
            </select>
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="drinkTypeFilter='all';updateFilterTabs();loadDrinks();">
                Все позиции
            </button>
            <button class="filter-tab" onclick="drinkTypeFilter='positive';updateFilterTabs();loadDrinks();">
                Обычные
            </button>
            <button class="filter-tab" onclick="drinkTypeFilter='negative';updateFilterTabs();loadDrinks();">
                🔻 Скидки и возвраты
            </button>
        </div>
    </div>
    
    <div id="drinksList"></div>
</div>

        <!-- Панель: Счёт -->
        <div class="panel" id="panel-bill">
            <div id="billContent"></div>
            <button class="btn btn-green" id="btnCloseSess">🔄 Закрыть сессию</button>
        </div>

        <!-- Панель: История -->
<div class="panel" id="panel-history">
    <div class="card">
        <h3>📜 Архив сессий</h3>
        <div class="row">
            <input type="date" id="historyDateFrom" onchange="renderHistory()">
            <input type="date" id="historyDateTo" onchange="renderHistory()">
            <button class="btn btn-outline btn-sm" id="btnRefreshHist">🔄 Обновить</button>
        </div>
    </div>
    <div id="sessionsList"></div>
</div>

<!-- Панель: Аналитика -->
<div class="panel" id="panel-analytics">
    <div class="card">
        <h3>📅 Период</h3>
        <div class="row">
            <input type="date" id="analyticsDateFrom" onchange="renderAnalytics()">
            <input type="date" id="analyticsDateTo" onchange="renderAnalytics()">
            <button class="btn btn-outline btn-sm" onclick="
                document.getElementById('analyticsDateFrom').value='';
                document.getElementById('analyticsDateTo').value='';
                renderAnalytics();
            ">Сбросить</button>
        </div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card"><h3>📊 Топ напитков</h3><div id="drinksChart"></div></div>
    <div class="card"><h3>👥 Топ гостей</h3><div id="guestsChart"></div></div>
    <div class="card"><h3>📈 Выручка по дням</h3><div id="revenueChart"></div></div>
</div>

    <!-- Модалка чека -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <h3>🧾 Чек</h3>
            <img id="receiptImage" src="" alt="Чек">
            <div class="modal-actions">
                <button class="btn btn-accent" id="btnDownloadReceipt">💾 Скачать PNG</button>
                <button class="btn btn-outline" id="btnCloseModal">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="toasts"></div>


    <!-- Модалка покера -->
<div class="modal-overlay" id="pokerModal">
    <div class="modal-content" style="max-width:500px;">
        <h3 id="pokerModalTitle" style="color:var(--gold);margin-bottom:12px;"></h3>
        <div id="pokerModalBody"></div>
        <button class="btn btn-outline" onclick="closeModal()" style="width:100%;margin-top:12px;">Закрыть</button>
    </div>
</div>
    
    <!-- Скрипты -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/guests.js"></script>
    <script src="/static/js/drinks.js"></script>
    <script src="/static/js/orders.js"></script>
    <script src="/static/js/bill.js"></script>
    <script src="/static/js/sessions.js"></script>
    <script src="/static/js/analytics.js"></script>
    <script src="/static/js/receipt.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/poker.js"></script>
</body>
</html>
